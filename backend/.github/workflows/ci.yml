name: CI/CD Pipeline

on:
  push:
    branches: [ master ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build backend Docker image
        run: docker build -t devops-backend ./backend

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build frontend Docker image
        run: docker build -t devops-frontend ./frontend